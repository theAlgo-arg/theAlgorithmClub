<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurant Templates</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,sans-serif;
}

body{
background:#f5f7fb;
padding:60px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
font-size:42px;
margin-bottom:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(380px,1fr));
gap:30px;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:260px;
object-fit:cover;
}

.content{
padding:25px;
}

.content h2{
margin-bottom:10px;
}

.content p{
color:#666;
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:12px 22px;
background:#2563eb;
color:white;
text-decoration:none;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h1>Restaurant Templates</h1>

<div class="grid">

<div class="card">

<img src="../../assets/previews/restaurant.jpg">

<div class="content">

<h2>Maison Restaurant</h2>

<p>Premium Fine Dining Website Template</p>

<a href="maison.html" class="btn">
Preview Template
</a>

</div>

</div>

</div>

</div>

</body>
</html>
